name: Playwright CI with Allure

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  ui-tests:
    name: Run UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npx playwright test --project=ui
        continue-on-error: true

      - name: Upload UI Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 7

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/
          retention-days: 7

  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        run: npx playwright test --project=api
        continue-on-error: true

      - name: Upload API Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  db-tests:
    name: Run DB Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Dockerized DB
        run: npm run db:up

      - name: Wait for DB to be ready
        run: sleep 10

      - name: Show DB logs
        run: npm run db:logs &
        continue-on-error: true

      - name: Run DB tests
        run: npx playwright test --project=db
        continue-on-error: true

      - name: Stop Dockerized DB
        if: always()
        run: npm run db:down

      - name: Upload DB Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-db
          path: playwright-report/
          retention-days: 7

      - name: Upload DB Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-db
          path: allure-results/
          retention-days: 7

  allure-report:
    name: Generate Combined Allure Report
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests, db-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: merged-allure-results/ui

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: merged-allure-results/api

      - name: Download DB Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-db
          path: merged-allure-results/db

      - name: Merge Allure results
        run: |
          mkdir -p allure-results
          find merged-allure-results -type f -exec cp {} allure-results/ \;

      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7
